<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>One Morocco</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <link rel="stylesheet" href="/static/css/style.css" />
    </head>
    <body>
        <!-- 1. MAP -->
        <div id="map"></div>

        <!-- 2. HOME SCREEN -->
        <div id="home-screen" class="overlay active">
            <!-- Language Toggle Button (Top Left) -->
            <button id="home-lang-btn" onclick="toggleLang()">EN</button>

            <div class="home-content">
                <h1 class="main-title">ONE MOROCCO</h1>
                <p id="home-subtitle" class="subtitle">اكتشف المغرب العميق</p>

                <div class="btn-group">
                    <button
                        id="btn-quiz"
                        class="btn btn-primary"
                        onclick="startQuizMode()"
                    >
                        🚀 ابدأ الاختبار
                    </button>
                    <button
                        id="btn-explore"
                        class="btn btn-secondary"
                        onclick="startExploreMode()"
                    >
                        🗺️ استكشف الخريطة
                    </button>
                    <button
                        id="btn-tutorial"
                        class="btn btn-tertiary"
                        onclick="openModal('tutorial')"
                    >
                        ❔ كيفية الاستخدام
                    </button>
                    <button
                        id="btn-history"
                        class="btn btn-tertiary"
                        onclick="openModal('history')"
                    >
                        📜 التاريخ
                    </button>
                </div>
            </div>
        </div>

        <!-- 3. EXPLORE NAV -->
        <div id="explore-nav" class="top-nav">
            <h3 id="explore-title">وضع الاستكشاف</h3>
            <button class="btn btn-primary" onclick="goHome()">
                🏠 الرئيسية
            </button>
        </div>

        <!-- 4. QUIZ SIDEBAR -->
        <div id="quiz-sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2 id="sidebar-title">الجهات الصحراوية</h2>
                <button class="btn-back" onclick="goHome()">→ العودة</button>
            </div>
            <div id="region-list"></div>
        </div>

        <!-- 5. MODALS -->

        <!-- Tutorial Modal -->
        <div id="tutorial-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('tutorial')"
                    >&times;</span
                >
                <h2 id="tutorial-title">كيفية الاستخدام</h2>
                <div id="tutorial-body">
                    <p>1. اختر منطقة من القائمة.</p>
                    <p>2. أجب على الأسئلة لفتح المناطق التالية.</p>
                </div>
            </div>
        </div>

        <!-- History Modal -->
        <div id="history-modal" class="modal">
            <div class="modal-content fullscreen">
                <span
                    class="close-btn"
                    style="color: white"
                    onclick="closeModal('history')"
                    >&times;</span
                >
                <iframe
                    src="https://gamma.app/embed/u2mhzp72zaj0yrn"
                    allow="fullscreen"
                ></iframe>
            </div>
        </div>

        <!-- Info Modal (Explore) -->
        <div id="info-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('info')"
                    >&times;</span
                >
                <h2 id="info-title">اسم الجهة</h2>
                <div id="info-body"></div>
            </div>
        </div>

        <!-- Quiz Modal -->
        <div id="quiz-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('quiz')"
                    >&times;</span
                >

                <div id="quiz-header">
                    <h2 id="quiz-title">جهة...</h2>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill"></div>
                    </div>
                </div>

                <div id="quiz-body"></div>
                <div id="quiz-footer" style="text-align: center; display: none">
                    <button
                        class="btn btn-primary"
                        onclick="startQuiz(currentRegionId)"
                    >
                        إعادة
                    </button>
                </div>
            </div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="/static/js/app.js"></script>
    </body>
</html>
